name: VeloForge
options:
  bundleIdPrefix: com.tdog9
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  VeloForge:
    type: application
    platform: iOS
    sources:
      - path: VeloForge
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tdog9.veloforge
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: VeloForge
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSHealthShareUsageDescription: "VeloForge reads workouts and heart rate to personalise your training."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "VeloForge logs completed HPV sessions to Apple Health."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: VeloForge/VeloForge.entitlements
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - target: VeloForgeWatchApp
        embed: true
        codeSign: true

  VeloForgeWatchApp:
    type: application
    platform: watchOS
    sources:
      - path: VeloForgeWatch
      # Shared is selectively included — Firestore-adjacent files are iOS-only
      # because FirebaseFirestore doesn't build for watchOS (C++ gRPC/LevelDB).
      # Watch-side Firestore access flows via WatchConnectivity → iPhone.
      - path: Shared/AuthService.swift
      - path: Shared/FirebaseBootstrap.swift
      - path: Shared/UserProfile.swift
      - path: Shared/PlanOverride.swift
      - path: Shared/Workout.swift
      - path: Shared/HealthKitService.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tdog9.veloforge.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: VeloForge
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.tdog9.veloforge
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: NO
        INFOPLIST_KEY_NSHealthShareUsageDescription: "VeloForge reads workouts and heart rate to personalise your training."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "VeloForge logs completed HPV sessions to Apple Health."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: VeloForgeWatch/VeloForgeWatch.entitlements
    dependencies:
      - package: Firebase
        product: FirebaseAuth
