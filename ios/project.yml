name: TurboPrep
options:
  bundleIdPrefix: com.403productions
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "7HM78HZ5D4"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "20260513003"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  TurboPrep:
    type: application
    platform: iOS
    sources:
      - path: TurboPrep
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.403productions.turboprep
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: TurboPrep
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSHealthShareUsageDescription: "TurboPrep reads workouts and heart rate to personalise your training."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "TurboPrep logs completed HPV sessions to Apple Health."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "TurboPrep uses your location to log GPS workouts and verify race-day stints."
        INFOPLIST_KEY_NSCameraUsageDescription: "Take a profile photo or attach an image to a race log."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Choose a profile photo or attach images to your race logs."
        INFOPLIST_KEY_NSMotionUsageDescription: "Detect ride starts so workouts can auto-log."
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: TurboPrep/TurboPrep.entitlements
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseMessaging
      - target: TurboPrepWatchApp
        embed: true
        codeSign: true
      - target: TurboPrepLiveActivity
        embed: true
        codeSign: true
      - target: TurboPrepHomeWidget
        embed: true
        codeSign: true

  TurboPrepWatchApp:
    type: application
    platform: watchOS
    sources:
      - path: TurboPrepWatch
      # Shared is selectively included — Firestore-adjacent files are iOS-only
      # because FirebaseFirestore doesn't build for watchOS (C++ gRPC/LevelDB).
      # Watch-side Firestore access flows via WatchConnectivity → iPhone.
      - path: Shared/AuthService.swift
      - path: Shared/FirebaseBootstrap.swift
      - path: Shared/UserProfile.swift
      - path: Shared/PlanOverride.swift
      - path: Shared/Workout.swift
      - path: Shared/HealthKitService.swift
      - path: Shared/WorkoutPayload.swift
      - path: Shared/ConnectivityService.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.403productions.turboprep.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: TurboPrep
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.403productions.turboprep
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: NO
        INFOPLIST_KEY_NSHealthShareUsageDescription: "TurboPrep reads workouts and heart rate to personalise your training."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "TurboPrep logs completed HPV sessions to Apple Health."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "TurboPrep uses your location to show your speed during race-day stints."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: TurboPrepWatch/TurboPrepWatch.entitlements
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - target: TurboPrepWatchComplication
        embed: true
        codeSign: true

  TurboPrepLiveActivity:
    # iOS Live Activity Widget Extension. Renders a stint-tracking
    # activity on the lock screen + Dynamic Island while a race-day
    # stint is in flight. Updates flow from the web app (raceday.js)
    # via the tpNative bridge → LiveActivityManager → ActivityKit.
    type: app-extension
    platform: iOS
    sources:
      - path: TurboPrepLiveActivity
      - path: Shared/StintActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.403productions.turboprep.liveactivity
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TurboPrepLiveActivity/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: TurboPrep

  TurboPrepHomeWidget:
    # iOS home-screen WidgetKit extension. Reads cached race-phase +
    # today's plan from the shared App Group container that the main
    # app writes (via WebViewContainer's home-widget-state handler).
    type: app-extension
    platform: iOS
    sources:
      - path: TurboPrepHomeWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.403productions.turboprep.homewidget
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TurboPrepHomeWidget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: TurboPrep
        CODE_SIGN_ENTITLEMENTS: TurboPrepHomeWidget/TurboPrepHomeWidget.entitlements

  TurboPrepWatchComplication:
    # WidgetKit extension — provides the watch face complication for
    # TurboPrep. Reads cached state from the shared App Group container
    # (group.com.403productions.turboprep) that the Watch app writes.
    type: app-extension
    platform: watchOS
    sources:
      - path: TurboPrepWatchComplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.403productions.turboprep.watchkitapp.tpwidget
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TurboPrepWatchComplication/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: TurboPrep
        CODE_SIGN_ENTITLEMENTS: TurboPrepWatchComplication/TurboPrepComplication.entitlements
