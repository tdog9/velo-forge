    listHTML='<div class="empty-state"><div class="empty-state-icon">'+I.dumbbell+'</div><div class="empty-state-title">No workouts yet</div><div class="empty-state-desc">Log your first workout to start tracking your training</div><button class="btn btn-primary" style="margin-top:12px" onclick="openWorkoutSheet()" data-testid="empty-log-btn">'+I.plus+' Log Workout</button></div>';
  } else if(f.length===0){
    listHTML='<div style="text-align:center;padding:40px 0;color:var(--muted-fg)">No workouts match this filter.</div>';
  } else {
    listHTML=f.map(function(w){return '<div class="card wo-card" data-testid="workout-card"><div class="card-pad"><div class="wo-top"><div class="wo-left"><div class="wo-title-row"><span class="wo-name">'+esc(w.title)+'</span>'+iBadge(w.intensity)+tBadge(w.type)+'</div><div class="wo-stats"><span>'+new Date(w.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</span><span class="tabular-nums">'+fmtDur(w.duration)+'</span>'+(w.distance!=null?'<span class="tabular-nums">'+w.distance+' km</span>':'')+(w.avgPower!=null?'<span class="tabular-nums">'+w.avgPower+' W</span>':'')+(w.avgHeartRate!=null?'<span class="tabular-nums">'+w.avgHeartRate+' bpm</span>':'')+(w.calories!=null?'<span class="tabular-nums">'+w.calories+' kcal</span>':'')+'</div>'+(w.notes?'<div class="wo-notes">'+esc(w.notes)+'</div>':'')+'</div><button class="btn btn-ghost btn-icon" onclick="deleteWorkout(\''+w.id+'\')" data-testid="delete-workout-btn" title="Delete">'+I.trash+'</button></div></div></div>'}).join('');
  }

  return '<div class="space-y page-enter" data-testid="workouts-page">'
    +statsBar
    +'<div class="filter-bar">'+I.filter
      +'<select class="input" style="width:140px;height:38px;font-size:13px" onchange="workoutFilter=this.value;render()" data-testid="filter-type">'
        +'<option value="all"'+(workoutFilter==='all'?' selected':'')+'>All Types</option>'
        +'<option value="cycling"'+(workoutFilter==='cycling'?' selected':'')+'>Cycling</option>'
        +'<option value="endurance"'+(workoutFilter==='endurance'?' selected':'')+'>Endurance</option>'
        +'<option value="intervals"'+(workoutFilter==='intervals'?' selected':'')+'>Intervals</option>'
        +'<option value="sprint"'+(workoutFilter==='sprint'?' selected':'')+'>Sprint</option>'
        +'<option value="strength"'+(workoutFilter==='strength'?' selected':'')+'>Strength</option>'
      +'</select>'
      +'<span class="filter-count">'+f.length+' workout'+(f.length!==1?'s':'')+'</span>'
    +'</div>'
    +listHTML
    +'<div class="footer"><a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener">Created with Perplexity Computer</a></div>'
  +'</div>';
}

function openWorkoutSheet(){
  var today=new Date().toISOString().split('T')[0];
  showSheet(
    '<div class="sheet-handle"></div>'
    +'<div class="sheet-title">Log Workout</div>'
    +'<form id="wo-form">'
      +'<div class="form-group"><label class="label">Title *</label><input class="input" name="title" placeholder="e.g. Morning Ride" required data-testid="workout-title-input"></div>'
      +'<div class="form-row"><div class="form-group"><label class="label">Date *</label><input class="input" name="date" type="date" value="'+today+'" required data-testid="workout-date-input"></div><div class="form-group"><label class="label">Duration (min) *</label><input class="input" name="duration" type="number" min="1" value="60" required data-testid="workout-duration-input"></div></div>'
      +'<div class="form-row"><div class="form-group"><label class="label">Type *</label><select class="input" name="type" required data-testid="workout-type-select"><option value="cycling">Cycling</option><option value="endurance">Endurance</option><option value="intervals">Intervals</option><option value="sprint">Sprint</option><option value="strength">Strength</option></select></div><div class="form-group"><label class="label">Intensity *</label><select class="input" name="intensity" required data-testid="workout-intensity-select"><option value="easy">Easy</option><option value="moderate">Moderate</option><option value="hard">Hard</option><option value="max">Max</option></select></div></div>'
      +'<div class="form-row"><div class="form-group"><label class="label">Distance (km)</label><input class="input" name="distance" type="number" step="0.1" min="0" placeholder="--"></div><div class="form-group"><label class="label">Avg Power (W)</label><input class="input" name="avgPower" type="number" min="0" placeholder="--"></div></div>'
      +'<div class="form-row"><div class="form-group"><label class="label">Avg Heart Rate (bpm)</label><input class="input" name="avgHeartRate" type="number" min="0" placeholder="--"></div><div class="form-group"><label class="label">Calories (kcal)</label><input class="input" name="calories" type="number" min="0" placeholder="--"></div></div>'
      +'<div class="form-group"><label class="label">Notes</label><textarea class="input" name="notes" rows="2" placeholder="How did it feel?"></textarea></div>'
      +'<button type="submit" class="btn btn-primary" style="width:100%" data-testid="submit-workout-btn">Save Workout</button>'
    +'</form>'
  );
  document.getElementById('wo-form').addEventListener('submit',function(e){
    e.preventDefault();var fd=new FormData(e.target);
    workouts.push({id:gid(),title:fd.get('title'),date:fd.get('date'),type:fd.get('type'),intensity:fd.get('intensity'),
      duration:parseInt(fd.get('duration')),distance:fd.get('distance')?parseFloat(fd.get('distance')):null,
      avgPower:fd.get('avgPower')?parseInt(fd.get('avgPower')):null,avgHeartRate:fd.get('avgHeartRate')?parseInt(fd.get('avgHeartRate')):null,
      calories:fd.get('calories')?parseInt(fd.get('calories')):null,notes:fd.get('notes')||null});
    closeSheet();render();
  });
}

function deleteWorkout(id){var i=workouts.findIndex(function(w){return w.id===id});if(i>=0)workouts.splice(i,1);render()}

// ===== PAGE: PLANS =====
let plansTab='in_vehicle';
let expandedPlan=null;

function renderPlans(){
  var cats=[
    {v:'in_vehicle',l:'In Vehicle',icon:'bike'},
    {v:'floor_home',l:'Floor & Home',icon:'home'},
    {v:'fitness_machine',l:'Machine',icon:'dumbbell'},
  ];
  function plansFor(c){return trainingPlans.filter(function(p){return p.category===c&&p.yearLevel===selectedYear})}
  function pwFor(pid){return planWorkouts.filter(function(pw){return pw.planId===pid}).sort(function(a,b){return a.weekNumber-b.weekNumber||a.dayOfWeek-b.dayOfWeek})}
  function groupWeek(pws){var m={};pws.forEach(function(pw){(m[pw.weekNumber]=m[pw.weekNumber]||[]).push(pw)});return Object.entries(m).sort(function(a,b){return a[0]-b[0]})}

  var yl=YEAR_LEVELS.find(function(y){return y.id===selectedYear});
  var safetyHTML='<div class="safety-banner" data-testid="safety-banner">'
    +'<div class="safety-header">'+I.info+' <strong>'+yl.label+' Guidelines</strong> <span class="safety-ages">(Ages '+yl.ages+')</span></div>'
    +'<div class="safety-details">'
      +'<span>'+I.clock+' '+yl.sessionsPerWeek+' sessions/wk, up to '+yl.maxSession+'min</span>'
      +'<span>Max intensity: '+yl.maxIntensity+'</span>'
    +'</div>'
    +'<div class="safety-guideline">'+yl.guideline+'</div>'
  +'</div>';

  function planCard(p){
    var exp=expandedPlan===p.id;
    var pws=exp?pwFor(p.id):[];
    var wks=exp?groupWeek(pws):[];
    return '<div class="card plan-card'+(p.active?' active-plan':'')+'" data-testid="plan-card">'
      +'<div class="plan-header" onclick="togglePlan(\''+p.id+'\')">'
        +'<div style="flex:1;min-width:0">'
          +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">'
            +'<span class="card-title" style="font-size:15px">'+esc(p.name)+'</span>'
            +(p.active?'<span class="badge badge-primary" data-testid="active-badge" style="font-size:10px">'+I.check+' Active</span>':'')
          +'</div>'
          +'<div class="card-desc">'+esc(p.description)+'</div>'
          +'<div class="plan-badges"><span class="badge badge-outline">'+I.calendar+' '+p.durationWeeks+'w</span>'+dBadge(p.difficulty)+tBadge(p.type)+'</div>'
        +'</div>'
        +'<div class="plan-actions">'
          +(!p.active?'<button class="btn btn-secondary" style="font-size:12px;padding:6px 12px;min-height:36px" onclick="event.stopPropagation();activatePlan(\''+p.id+'\')" data-testid="activate-plan-btn">Activate</button>':'')
          +'<span class="plan-chevron">'+(exp?I.chevUp:I.chevDown)+'</span>'
        +'</div>'
      +'</div>'
      +(exp?'<div class="plan-schedule">'
        +wks.map(function(wk){return '<div style="margin-bottom:16px"><div class="week-title">Week '+wk[0]+'</div>'
          +wk[1].map(function(pw){return '<div class="pw-row" data-testid="plan-workout"><div class="pw-day">'+DAYS[pw.dayOfWeek]+'</div><div class="pw-info"><div class="pw-name">'+esc(pw.title)+'<span class="'+iDot(pw.intensity)+'"></span></div><div class="pw-desc">'+esc(pw.description)+'</div><div class="pw-meta"><span class="pw-dur">'+I.clock+' '+pw.durationMinutes+'m</span>'+tBadge(pw.type)+'</div></div></div>'}).join('')
        +'</div>'}).join('')
      +'</div>':'')
    +'</div>';
  }

  return '<div class="space-y page-enter" data-testid="plans-page">'
    +'<div class="pill-tabs" data-testid="plan-tabs">'
      +cats.map(function(c){return '<button class="pill-tab'+(plansTab===c.v?' active':'')+'" onclick="plansTab=\''+c.v+'\';render()" data-testid="tab-'+c.v+'">'+I[c.icon]+'<span>'+c.l+'</span></button>'}).join('')
    +'</div>'
    +'<div class="year-tabs" data-testid="year-tabs">'
      +YEAR_LEVELS.map(function(y){return '<button class="year-pill'+(selectedYear===y.id?' active':'')+'" onclick="selectedYear=\''+y.id+'\';expandedPlan=null;render()" data-testid="year-'+y.id+'">'+y.label+'</button>'}).join('')
    +'</div>'
    +safetyHTML
    +'<div class="space-y">'
      +plansFor(plansTab).map(function(p){return planCard(p)}).join('')
      +(plansFor(plansTab).length===0?'<div style="text-align:center;padding:40px 0;color:var(--muted-fg)">No plans in this category.</div>':'')
    +'</div>'
    +'<div class="footer"><a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener">Created with Perplexity Computer</a></div>'
  +'</div>';
}
function togglePlan(id){expandedPlan=expandedPlan===id?null:id;render()}
function activatePlan(id){trainingPlans.forEach(function(p){p.active=false});var p=trainingPlans.find(function(p){return p.id===id});if(p)p.active=true;render()}

// ===== PAGE: RACES =====
let countdownInterval=null;

function renderRaces(){
  return '<div class="space-y page-enter" data-testid="races-page">'
    +(sortR().length===0?'<div style="text-align:center;padding:40px 0;color:var(--muted-fg)">No upcoming races.</div>':'')
    +sortR().map(function(r){return renderRaceCard(r)}).join('')
    +'<div class="footer"><a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener">Created with Perplexity Computer</a></div>'
  +'</div>';
}

function renderRaceCard(r){
  var tl=getTimeLeft(r.date);
  return '<div class="card race-card" data-testid="race-card"><div class="card-pad">'
    +'<div class="race-top"><div style="flex:1;min-width:0">'
      +'<div class="race-name">'+I.flag+' '+esc(r.name)+'</div>'
      +'<div class="race-meta">'
        +'<span class="race-meta-item">'+I.mapPin+' '+esc(r.location)+'</span>'
        +'<span class="race-meta-item">'+I.calendar+' '+new Date(r.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})+'</span>'
        +'<span class="race-meta-item">'+I.route+' <span class="tabular-nums">'+r.distance+' km</span></span>'
        +tBadge(r.type)
      +'</div>'
    +'</div>'
    +'<button class="btn btn-ghost btn-icon" onclick="deleteRace(\''+r.id+'\')" data-testid="delete-race-btn" title="Delete">'+I.trash+'</button></div>'
    +(tl.total<=0?'<div class="race-day-badge"><span class="badge badge-primary" style="font-size:14px;padding:4px 16px">Race Day!</span></div>'
      :'<div class="countdown-grid" data-testid="countdown-timer" data-race-id="'+r.id+'" data-race-date="'+r.date+'">'
        +'<div class="time-unit"><div class="time-unit-box">'+String(tl.days).padStart(2,'0')+'</div><div class="time-unit-label">Days</div></div>'
        +'<span class="countdown-sep">:</span>'
        +'<div class="time-unit"><div class="time-unit-box">'+String(tl.hours).padStart(2,'0')+'</div><div class="time-unit-label">Hours</div></div>'
        +'<span class="countdown-sep">:</span>'
        +'<div class="time-unit"><div class="time-unit-box">'+String(tl.minutes).padStart(2,'0')+'</div><div class="time-unit-label">Min</div></div>'
        +'<span class="countdown-sep">:</span>'
        +'<div class="time-unit"><div class="time-unit-box">'+String(tl.seconds).padStart(2,'0')+'</div><div class="time-unit-label">Sec</div></div>'
      +'</div>')
    +(r.notes?'<div class="race-notes">'+esc(r.notes)+'</div>':'')
  +'</div></div>';
}

function getTimeLeft(ds){
  var t=new Date(ds+'T00:00:00').getTime()-Date.now();
  if(t<=0)return{days:0,hours:0,minutes:0,seconds:0,total:0};
  return{days:Math.floor(t/864e5),hours:Math.floor((t/36e5)%24),minutes:Math.floor((t/6e4)%60),seconds:Math.floor((t/1e3)%60),total:t};
}

function updateCountdowns(){
  document.querySelectorAll('[data-race-date]').forEach(function(el){
    var tl=getTimeLeft(el.getAttribute('data-race-date'));
    var b=el.querySelectorAll('.time-unit-box');
    if(b.length===4){b[0].textContent=String(tl.days).padStart(2,'0');b[1].textContent=String(tl.hours).padStart(2,'0');b[2].textContent=String(tl.minutes).padStart(2,'0');b[3].textContent=String(tl.seconds).padStart(2,'0')}
    if(tl.total<=0)el.innerHTML='<div class="race-day-badge"><span class="badge badge-primary" style="font-size:14px;padding:4px 16px">Race Day!</span></div>';
  });
}

function openRaceSheet(){
  showSheet(
    '<div class="sheet-handle"></div>'
    +'<div class="sheet-title">Add Race</div>'
    +'<form id="race-form">'
      +'<div class="form-group"><label class="label">Race Name</label><input class="input" name="name" required data-testid="race-name-input"></div>'
      +'<div class="form-row"><div class="form-group"><label class="label">Date</label><input class="input" name="date" type="date" required data-testid="race-date-input"></div><div class="form-group"><label class="label">Location</label><input class="input" name="location" required></div></div>'
      +'<div class="form-row"><div class="form-group"><label class="label">Distance (km)</label><input class="input" name="distance" type="number" step="0.01" min="0" required></div><div class="form-group"><label class="label">Type</label><select class="input" name="type" required data-testid="race-type-select"><option value="sprint">Sprint</option><option value="endurance">Endurance</option><option value="time_trial">Time Trial</option><option value="multi_day">Multi Day</option></select></div></div>'
      +'<div class="form-group"><label class="label">Notes</label><textarea class="input" name="notes" rows="2"></textarea></div>'
      +'<button type="submit" class="btn btn-primary" style="width:100%" data-testid="submit-race-btn">Add Race</button>'
    +'</form>'
  );
  document.getElementById('race-form').addEventListener('submit',function(e){
    e.preventDefault();var fd=new FormData(e.target);
    races.push({id:gid(),name:fd.get('name'),date:fd.get('date'),location:fd.get('location'),
      distance:parseFloat(fd.get('distance')),type:fd.get('type'),notes:fd.get('notes')||null});
    closeSheet();render();
  });
}

function deleteRace(id){var i=races.findIndex(function(r){return r.id===id});if(i>=0)races.splice(i,1);render()}

// ===== BOTTOM SHEET =====
function showSheet(html){
  var root=document.getElementById('sheet-root');
  root.innerHTML='<div class="sheet-overlay" id="sheet-bg"></div><div class="sheet" id="sheet-panel">'+html+'</div>';
  requestAnimationFrame(function(){
    document.getElementById('sheet-bg').classList.add('visible');
    document.getElementById('sheet-panel').classList.add('visible');
  });
  document.getElementById('sheet-bg').addEventListener('click',closeSheet);
}
function closeSheet(){
  var bg=document.getElementById('sheet-bg'),panel=document.getElementById('sheet-panel');
  if(bg)bg.classList.remove('visible');
  if(panel)panel.classList.remove('visible');
  setTimeout(function(){document.getElementById('sheet-root').innerHTML=''},300);
}

// ===== FAB =====
function renderFab(){
  var existing=document.getElementById('fab-btn');
  if(existing)existing.remove();
  if(currentRoute==='/workouts'){
    var fab=document.createElement('button');fab.id='fab-btn';fab.className='fab';fab.setAttribute('data-testid','log-workout-btn');
    fab.innerHTML=I.plus;fab.onclick=openWorkoutSheet;document.body.appendChild(fab);
  } else if(currentRoute==='/races'){
    var fab=document.createElement('button');fab.id='fab-btn';fab.className='fab';fab.setAttribute('data-testid','add-race-btn');
    fab.innerHTML=I.plus;fab.onclick=openRaceSheet;document.body.appendChild(fab);
  }
}

// ===== RENDER =====
function render(){
  currentRoute=getRoute();
  renderTabBar();
  renderFab();

  var ht=document.getElementById('header-title');
  var nav=NAV.find(function(n){return n.path===currentRoute});
  ht.textContent=nav?nav.title:'';

  var content=document.getElementById('content');
  if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null}

  switch(currentRoute){
    case '/':content.innerHTML=renderToday();break;
    case '/workouts':content.innerHTML=renderWorkouts();break;
    case '/plans':content.innerHTML=renderPlans();break;
    case '/races':content.innerHTML=renderRaces();countdownInterval=setInterval(updateCountdowns,1000);break;
    default:content.innerHTML=renderToday();break;
  }
  content.scrollTop=0;
}

// ===== INIT =====
window.addEventListener('hashchange',render);
render();
</script>
</body>
</html>
