[build]
  functions = "netlify/functions"
  publish = "."
  command = "node scripts/stamp-version.js"

[functions]
  node_bundler = "esbuild"

# Apple's Associated Domains check downloads
# https://turboprep.app/.well-known/apple-app-site-association and rejects
# anything that isn't application/json with no extension. Force the right
# Content-Type and skip caching so Apple always sees the latest declaration.
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

# Caching headers. index.html always re-fetches so deploys show up
# immediately. For JS/CSS, stale-while-revalidate lets browsers use a
# cached copy instantly on repeat visits, then re-fetch in the background
# — users see the new version on their next page load, not the current
# one. We can't use "immutable" because the filenames don't change per
# deploy (only CACHE_NAME / APP_VERSION inside them do).
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
